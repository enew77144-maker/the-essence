# Render.com Blueprint for The Essence backend.
# https://render.com/docs/blueprint-spec
#
# Usage: in the Render dashboard, "New" -> "Blueprint" -> connect this repo.
# The web service uses the backend/ subdirectory as its root.
services:
  - type: web
    name: the-essence-backend
    runtime: python
    plan: free
    rootDir: backend
    autoDeploy: true
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    preDeployCommand: python manage.py migrate --no-input
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    healthCheckPath: /api/schema/swagger-ui/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: CORS_ALLOWED_ORIGINS
        sync: false # set to your deployed frontend origin, e.g. https://the-essence.vercel.app
      - key: DATABASE_URL
        sync: false # paste your Neon connection string (sslmode=require)
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLIC_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: CLOUDINARY_URL
        sync: false
